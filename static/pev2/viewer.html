<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Explain plan</title>
		<link href="https://unpkg.com/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet" />
		<link href="https://unpkg.com/pev2/dist/pev2.css" rel="stylesheet" />
	</head>
	<body>
		<div id="app" class="d-flex flex-column vh-100">
			<pev2 v-if="plan" :plan-source="plan" :plan-query="query" />
		</div>

		<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
		<script src="https://unpkg.com/pev2/dist/pev2.umd.js"></script>
		<script>
			const { createApp } = Vue;
			const app = createApp({
				data() {
					return { plan: '', query: '' };
				}
			});
			app.component('pev2', pev2.Plan);
			const vm = app.mount('#app');

			// The plan arrives from the same-origin SvelteKit page.
			window.addEventListener('message', (event) => {
				if (event.origin !== window.location.origin) return;
				if (event.data?.type !== 'pev2:plan') return;
				vm.plan = event.data.planJson ?? '';
				vm.query = event.data.query ?? '';
			});
		</script>
	</body>
</html>
